[package]
name = "praxis-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
autobins = false

[[bin]]
name = "praxis-tui"
path = "src/main.rs"

[[bin]]
name = "md-events"
path = "src/bin/md-events.rs"

[lib]
name = "praxis_tui"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
clap = { workspace = true, features = ["derive"] }
praxis-ansi-escape = { workspace = true }
praxis-app-server-client = { workspace = true }
praxis-app-server-protocol = { workspace = true }
praxis-arg0 = { workspace = true }
praxis-chatgpt = { workspace = true }
praxis-cloud-requirements = { workspace = true }
praxis-config = { workspace = true }
praxis-core = { workspace = true }
praxis-features = { workspace = true }
praxis-feedback = { workspace = true }
praxis-file-search = { workspace = true }
praxis-git-utils = { workspace = true }
praxis-login = { workspace = true }
praxis-otel = { workspace = true }
praxis-protocol = { workspace = true }
praxis-rollout = { workspace = true }
praxis-shell-command = { workspace = true }
praxis-state = { workspace = true }
praxis-terminal-detection = { workspace = true }
praxis-utils-approval-presets = { workspace = true }
praxis-utils-absolute-path = { workspace = true }
praxis-utils-cli = { workspace = true }
praxis-utils-elapsed = { workspace = true }
praxis-utils-fuzzy-match = { workspace = true }
praxis-utils-oss = { workspace = true }
praxis-utils-sandbox-summary = { workspace = true }
praxis-utils-sleep-inhibitor = { workspace = true }
praxis-utils-string = { workspace = true }
color-eyre = { workspace = true }
crossterm = { workspace = true, features = ["bracketed-paste", "event-stream"] }
derive_more = { workspace = true, features = ["is_variant"] }
diffy = { workspace = true }
dirs = { workspace = true }
dunce = { workspace = true }
image = { workspace = true, features = ["jpeg", "png", "gif", "webp"] }
itertools = { workspace = true }
json5 = { workspace = true }
lazy_static = { workspace = true }
pathdiff = { workspace = true }
pulldown-cmark = { workspace = true }
rand = { workspace = true }
ratatui = { workspace = true, features = [
    "scrolling-regions",
    "unstable-backend-writer",
    "unstable-rendered-line-info",
    "unstable-widget-ref",
] }
ratatui-macros = { workspace = true }
regex-lite = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
rmcp = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["preserve_order"] }
shlex = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
supports-color = { workspace = true }
tempfile = { workspace = true }
textwrap = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
    "test-util",
    "time",
] }
tokio-stream = { workspace = true, features = ["sync"] }
toml = { workspace = true }
tracing = { workspace = true, features = ["log"] }
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
syntect = "5"
two-face = { version = "0.5", default-features = false, features = ["syntect-default-onig"] }
unicode-segmentation = { workspace = true }
unicode-width = { workspace = true }
url = { workspace = true }
webbrowser = { workspace = true }
uuid = { workspace = true }

praxis-windows-sandbox = { workspace = true }
tokio-util = { workspace = true, features = ["time"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
cpal = "0.17"

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
which = { workspace = true }
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_System_Console",
] }
winsplit = "0.1"

# Clipboard support via `arboard` is not available on Android/Termux.
# Only include it for non-Android targets so the crate builds on Android.
[target.'cfg(not(target_os = "android"))'.dependencies]
arboard = { workspace = true }


[dev-dependencies]
praxis-cli = { workspace = true }
praxis-core = { workspace = true }
praxis-mcp = { workspace = true }
praxis-utils-cargo-bin = { workspace = true }
praxis-utils-pty = { workspace = true }
assert_matches = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rand = { workspace = true }
serial_test = { workspace = true }
vt100 = { workspace = true }
uuid = { workspace = true }
