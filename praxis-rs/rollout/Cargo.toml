[package]
edition.workspace = true
license.workspace = true
name = "praxis-rollout"
version.workspace = true

[lib]
doctest = false
name = "praxis_rollout"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
praxis-file-search = { workspace = true }
praxis-git-utils = { workspace = true }
praxis-login = { workspace = true }
praxis-otel = { workspace = true }
praxis-protocol = { workspace = true }
praxis-state = { workspace = true }
praxis-utils-path = { workspace = true }
praxis-utils-string = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
time = { workspace = true, features = [
    "formatting",
    "local-offset",
    "macros",
    "parsing",
] }
tokio = { workspace = true, features = [
    "fs",
    "io-util",
    "macros",
    "process",
    "rt",
    "sync",
    "time",
] }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
