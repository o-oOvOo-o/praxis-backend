name: sdk

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  sdks:
    runs-on:
      group: praxis-runners
      labels: praxis-linux-x64
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux bwrap build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Bazel CI
        id: setup_bazel
        uses: ./.github/actions/setup-bazel-ci
        with:
          target: x86_64-unknown-linux-gnu

      - name: Build Praxis with Bazel
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          # Use the shared CI wrapper so fork PRs fall back cleanly when
          # BuildBuddy credentials are unavailable. This workflow needs the
          # built Praxis binary on disk afterwards, so ask the wrapper to
          # override CI's default remote_download_minimal behavior.
          ./.github/scripts/run-bazel-ci.sh \
            --remote-download-toplevel \
            -- \
            build \
            --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
            --build_metadata=TAG_job=sdk \
            -- \
            //praxis-rs/cli:praxis

          # Resolve the exact output file using the same wrapper/config path as
          # the build instead of guessing which Bazel convenience symlink is
          # available on the runner.
          cquery_output="$(
            ./.github/scripts/run-bazel-ci.sh \
              -- \
              cquery \
              --output=files \
              -- \
              //praxis-rs/cli:praxis \
              | grep -E '^(/|bazel-out/)' \
              | tail -n 1
          )"
          if [[ "${cquery_output}" = /* ]]; then
            praxis_bazel_output_path="${cquery_output}"
          else
            praxis_bazel_output_path="${GITHUB_WORKSPACE}/${cquery_output}"
          fi
          if [[ -z "${praxis_bazel_output_path}" ]]; then
            echo "Bazel did not report an output path for //praxis-rs/cli:praxis." >&2
            exit 1
          fi
          if [[ ! -e "${praxis_bazel_output_path}" ]]; then
            echo "Unable to locate the Bazel-built Praxis binary at ${praxis_bazel_output_path}." >&2
            exit 1
          fi

          # Stage the binary into the workspace and point the SDK tests at that
          # stable path. The tests spawn Praxis directly many times, so using a
          # normal executable path is more reliable than invoking Bazel for each
          # test process.
          install_dir="${GITHUB_WORKSPACE}/.tmp/sdk-ci"
          mkdir -p "${install_dir}"
          install -m 755 "${praxis_bazel_output_path}" "${install_dir}/praxis"
          echo "PRAXIS_EXEC_PATH=${install_dir}/praxis" >> "$GITHUB_ENV"

      - name: Warm up Bazel-built Praxis
        shell: bash
        run: |
          set -euo pipefail
          "${PRAXIS_EXEC_PATH}" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter ./sdk/typescript run build

      - name: Lint SDK packages
        run: pnpm -r --filter ./sdk/typescript run lint

      - name: Test SDK packages
        run: pnpm -r --filter ./sdk/typescript run test

      - name: Save bazel repository cache
        if: always() && !cancelled() && steps.setup_bazel.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/bazel-repo-cache
          key: bazel-cache-x86_64-unknown-linux-gnu-${{ hashFiles('MODULE.bazel', 'praxis-rs/Cargo.lock', 'praxis-rs/Cargo.toml') }}
